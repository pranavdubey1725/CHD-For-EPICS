spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/ecgcare;AUTO_SERVER=TRUE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  h2:
    console:
      enabled: ${SPRING_H2_CONSOLE_ENABLED:false}
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  accessKey: ${MINIO_ACCESS_KEY:minio}
  secretKey: ${MINIO_SECRET_KEY:minio12345}
  bucket: ${MINIO_BUCKET:ecg-bucket}

jwt:
  issuer: ecgcare
  secret: ${JWT_SECRET:dev-jwt-secret-change-me}
  access-ttl-minutes: 15
  refresh-ttl-days: 7

ml:
  service-url: ${ML_SERVICE_URL:http://localhost:8000}
  predict-endpoint: /predict
  connect-timeout-seconds: 5
  read-timeout-seconds: 60
  max-retries: 3
  retry-delay-seconds: 2
  max-image-size-bytes: 10485760  # 10MB
